name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Prepare config header for CI build
        run: cp include/config.h.example include/config.h

      - name: Build firmware
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: pio run -e gh_release

      - name: Create GitHub Release and upload firmware.bin
        uses: softprops/action-gh-release@v2
        with:
          files: .pio/build/gh_release/firmware.bin
          generate_release_notes: true
