<svg width="480" height="640" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="480" height="640" fill="#f5f5f5"/>
  
  <!-- Header -->
  <rect width="480" height="50" fill="#e0e0e0"/>
  <text x="240" y="35" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">Library</text>
  
  <!-- Book 1: The Great Gatsby -->
  <rect x="20" y="70" width="200" height="120" fill="#d4af37" stroke="#000" stroke-width="2"/>
  <text x="120" y="140" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">The Great</text>
  <text x="120" y="158" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">Gatsby</text>
  <text x="120" y="185" font-size="10" text-anchor="middle" fill="#333">F. Scott</text>
  <rect x="20" y="195" width="200" height="8" fill="#ccc"/>
  <rect x="20" y="195" width="160" height="8" fill="#666"/>
  <text x="225" y="205" font-size="9" fill="#666">80%</text>
  
  <!-- Book 2: 1984 -->
  <rect x="260" y="70" width="200" height="120" fill="#cc0000" stroke="#000" stroke-width="2"/>
  <text x="360" y="140" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">1984</text>
  <text x="360" y="165" font-size="10" text-anchor="middle" fill="#fff">George Orwell</text>
  <rect x="260" y="195" width="200" height="8" fill="#ccc"/>
  <rect x="260" y="195" width="140" height="8" fill="#666"/>
  <text x="465" y="205" font-size="9" fill="#666">70%</text>
  
  <!-- Book 3: Dune -->
  <rect x="20" y="230" width="200" height="120" fill="#8b7355" stroke="#000" stroke-width="2"/>
  <text x="120" y="300" font-size="20" font-weight="bold" text-anchor="middle" fill="#fff">Dune</text>
  <text x="120" y="325" font-size="10" text-anchor="middle" fill="#ddd">Frank Herbert</text>
  <rect x="20" y="350" width="200" height="8" fill="#ccc"/>
  <rect x="20" y="350" width="100" height="8" fill="#666"/>
  <text x="225" y="360" font-size="9" fill="#666">50%</text>
  
  <!-- Book 4: Neuromancer -->
  <rect x="260" y="230" width="200" height="120" fill="#2c3e50" stroke="#000" stroke-width="2"/>
  <text x="360" y="295" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">Neuro-</text>
  <text x="360" y="312" font-size="14" font-weight="bold" text-anchor="middle" fill="#fff">mancer</text>
  <text x="360" y="335" font-size="9" text-anchor="middle" fill="#ccc">William Gibson</text>
  <rect x="260" y="350" width="200" height="8" fill="#ccc"/>
  <rect x="260" y="350" width="80" height="8" fill="#666"/>
  <text x="465" y="360" font-size="9" fill="#666">40%</text>
  
  <!-- Footer -->
  <rect y="590" width="480" height="50" fill="#e0e0e0"/>
  <text x="60" y="615" font-size="14" text-anchor="middle" fill="#000">◀ Prev</text>
  <text x="240" y="615" font-size="12" text-anchor="middle" fill="#666">Page 1 of 3</text>
  <text x="420" y="615" font-size="14" text-anchor="middle" fill="#000">Next ▶</text>
</svg>
